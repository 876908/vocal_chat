spring:
  application:
    name: vocal-chat
    version: 1.0.0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

vocal-chat:
  llm:
    qwen:
      enabled: ${QWEN_ENABLED:true}
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${DASHSCOPE_BASE_URL:}
      model-name: ${QWEN_MODEL_NAME:qwen-plus}
      search-model-name: ${QWEN_SEARCH_MODEL_NAME:qwen-plus}
      deep-thinking-model-name: ${QWEN_DEEP_THINKING_MODEL_NAME:qwen-plus}
      temperature: ${QWEN_TEMPERATURE:0.7}
      top-p: ${QWEN_TOP_P:0.8}
      top-k: ${QWEN_TOP_K:}
      max-tokens: ${QWEN_MAX_TOKENS:2048}
      thinking-budget: ${QWEN_THINKING_BUDGET:1024}
      support-incremental-output: ${QWEN_INCREMENTAL_OUTPUT:true}
      enable-sanitize-messages: ${QWEN_SANITIZE_MESSAGES:true}
  storage:
    provider: ${OBJECT_STORAGE_PROVIDER:minio}
    bucket-name: ${OBJECT_STORAGE_BUCKET:vocal-chat}
    presigned-url-expiry: ${OBJECT_STORAGE_PRESIGNED_URL_EXPIRY:30m}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
      ensure-bucket-exists: ${MINIO_ENSURE_BUCKET_EXISTS:true}
    cos:
      region: ${COS_REGION:ap-guangzhou}
      secret-id: ${COS_SECRET_ID:}
      secret-key: ${COS_SECRET_KEY:}
      public-endpoint: ${COS_PUBLIC_ENDPOINT:}

server.port: 9000
